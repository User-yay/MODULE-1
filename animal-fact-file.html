<!DOCTYPE html>
<html>
    <head>
        <title>Animal Facts</title>
        <style>
            body {
            background-color: aquamarine;
            font-family: Arial, Helvetica, sans-serif;
        }

        .fact-file {
            background-color:lightyellow
            color: darkslategray;
            width: 260px;
            padding: 25px;
            border: 4px solid forestgreen;
            margin: 30px;
        }

        .animal-name {
            color: forestgreen;
            font-size: 22px;
        }

        .detail {
            color: darkslategray;
        }

        .cool-fact {
            color: rgb(255, 98, 0);
            font-style: italic;
        }
        </style>
    </head>
    <body>
        <div class="fact-file">
            <h2 class="animal-name">Cheetah</h2>
            <p class="detail">Type: big cat</p>
            <p class="detail">Habitat: grasslands and savannas</p>
            <p class="detail">Diet: carnivore</p>
            <p class="cool-fact">Cool Fact: Cheetahs are the fastest land animals, capable of reaching speeds up to 60-70 mph (97-113 km/h)</p>
        </div>
    </body>
</html>
